<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Civil society in censorship, moderation & AI alignment</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  :root {
    --bg:#fafaf7; --ink:#1c1c1c; --muted:#6a6a6a; --accent:#9b1c1c;
    --chip:#eee8d8; --chip-on:#9b1c1c; --chip-on-ink:#fff; --line:#dcd6c5;
  }
  * { box-sizing: border-box; }
  html,body { margin:0; padding:0; background:var(--bg); color:var(--ink);
              font: 15px/1.45 ui-serif, Georgia, "Iowan Old Style", serif; }
  header { padding: 18px 22px; border-bottom: 1px solid var(--line); }
  header h1 { margin:0; font-size: 20px; font-weight:600; }
  header p  { margin:4px 0 0; color:var(--muted); font-size: 13px; }
  main { display:grid; grid-template-columns: 320px 1fr; min-height: calc(100vh - 60px); }
  aside { border-right:1px solid var(--line); padding: 14px 16px; overflow-y:auto;
          max-height: calc(100vh - 60px); position:sticky; top:0; }
  aside h2 { font-size: 12px; letter-spacing: .08em; text-transform: uppercase;
             color: var(--muted); margin: 14px 0 6px; }
  aside input[type=search] { width:100%; padding:6px 8px; border:1px solid var(--line);
             border-radius:6px; background:white; font: inherit; }
  .facet { margin-bottom: 8px; }
  .facet input[type=text] { width:100%; padding:4px 6px; border:1px solid var(--line);
             border-radius:4px; background:white; font: 13px ui-sans-serif,system-ui;
             margin-bottom: 4px; }
  .chips { display:flex; flex-wrap:wrap; gap:4px; max-height: 180px; overflow-y:auto; }
  .chip { font-size: 12px; padding: 2px 8px; border-radius: 999px;
          background: var(--chip); cursor: pointer; user-select:none;
          border: 1px solid transparent; }
  .chip:hover { border-color: var(--ink); }
  .chip.on { background: var(--chip-on); color: var(--chip-on-ink); }
  .chip .n { color:var(--muted); margin-left:4px; font-variant-numeric: tabular-nums; }
  .chip.on .n { color: rgba(255,255,255,.7); }
  section.results { padding: 16px 22px; }
  .meta { color: var(--muted); font-size: 13px; margin-bottom: 10px; }
  .clear { color: var(--accent); cursor: pointer; margin-left: 8px; }
  .row { padding: 12px 0; border-bottom: 1px solid var(--line); }
  .row .name { font-weight: 600; font-size: 16px; }
  .row .type { color: var(--muted); font-size: 12px; margin-left: 6px;
               text-transform: uppercase; letter-spacing: .04em; }
  .row .mech { margin: 4px 0 6px; }
  .row .src  { font-size: 13px; color: var(--muted); }
  .row .src em { font-style: italic; }
  .row .tags { margin-top: 6px; display:flex; flex-wrap:wrap; gap:4px; }
  .row .tags .tag { font-size: 11px; padding: 1px 6px; border-radius:4px;
                    background:#f0e9d5; color:#444; cursor:pointer; }
  .row .tags .tag:hover { background:#e1d6b0; }
  .row .tags .tag.k-where { background: #d9e4ec; }
  .row .tags .tag.k-when  { background: #e2d9ec; }
  .row .tags .tag.k-type  { background: #e9d9d9; }
  .row .tags .tag.k-norms { background: #d9e9d9; }
  .row .quote { font-size: 12px; color: var(--muted); margin-top:4px;
                border-left: 2px solid var(--line); padding-left: 8px; }
  .empty { padding: 30px 0; color: var(--muted); }
  @media (max-width: 760px) { main { grid-template-columns: 1fr; }
    aside { position: static; max-height: none; border-right: none;
            border-bottom: 1px solid var(--line); } }
</style>
</head>
<body>
<header>
  <h1>Civil society organisations in censorship, moderation & AI alignment</h1>
  <p>Faceted directory across academic literature and AI model cards.</p>
</header>
<main>
  <aside>
    <input type="search" id="q" placeholder="Search names, mechanisms, papers…">
    <div id="filters"></div>
  </aside>
  <section class="results">
    <div class="meta"><span id="count"></span><span id="active"></span></div>
    <div id="rows"></div>
  </section>
</main>

<script>
const FACETS = [
  { key: 'where', label: 'Where',                     multi: true  },
  { key: 'when',  label: 'When',                      multi: false },
  { key: 'type',  label: 'Type',                      multi: false },
  { key: 'norms', label: 'Norms / values / interests',multi: false },
];

const state = {
  rows: [],
  selected: { where: new Set(), when: new Set(), type: new Set(), norms: new Set() },
  q: '',
};

fetch('data.json').then(r => r.json()).then(rows => {
  state.rows = rows;
  buildFilters();
  render();
  // hash sync
  if (location.hash.length > 1) {
    try {
      const s = JSON.parse(decodeURIComponent(location.hash.slice(1)));
      for (const k of Object.keys(s)) {
        if (k === 'q') state.q = s[k];
        else if (state.selected[k]) state.selected[k] = new Set(s[k]);
      }
      document.querySelector('#q').value = state.q;
      render();
    } catch (e) {}
  }
});

document.querySelector('#q').addEventListener('input', e => {
  state.q = e.target.value.trim().toLowerCase();
  render();
});

function buildFilters() {
  const root = document.querySelector('#filters');
  root.innerHTML = '';
  for (const f of FACETS) {
    const counts = new Map();
    for (const r of state.rows) {
      const vals = f.multi ? (r[f.key] || []) : [r[f.key]];
      for (const v of vals) {
        if (!v) continue;
        counts.set(v, (counts.get(v) || 0) + 1);
      }
    }
    const sorted = [...counts.entries()].sort((a,b) => b[1]-a[1] || a[0].localeCompare(b[0]));
    const sec = document.createElement('div');
    sec.className = 'facet';
    sec.innerHTML = `<h2>${f.label} <span style="color:var(--muted);font-weight:normal">(${sorted.length})</span></h2>
                     <input type="text" placeholder="filter ${f.label.toLowerCase()}…" data-key="${f.key}">
                     <div class="chips" data-key="${f.key}"></div>`;
    root.appendChild(sec);
    const chipBox = sec.querySelector('.chips');
    for (const [val, n] of sorted) {
      const c = document.createElement('span');
      c.className = 'chip';
      c.dataset.key = f.key;
      c.dataset.val = val;
      c.innerHTML = `${escapeHtml(val)}<span class="n">${n}</span>`;
      c.onclick = () => toggle(f.key, val);
      chipBox.appendChild(c);
    }
    sec.querySelector('input[type=text]').addEventListener('input', e => {
      const term = e.target.value.toLowerCase();
      chipBox.querySelectorAll('.chip').forEach(ch => {
        ch.style.display = ch.dataset.val.toLowerCase().includes(term) ? '' : 'none';
      });
    });
  }
  refreshChipState();
}

function toggle(key, val) {
  const s = state.selected[key];
  if (s.has(val)) s.delete(val); else s.add(val);
  refreshChipState();
  render();
}

function refreshChipState() {
  document.querySelectorAll('.chip').forEach(ch => {
    const on = state.selected[ch.dataset.key]?.has(ch.dataset.val);
    ch.classList.toggle('on', !!on);
  });
}

function matches(r) {
  for (const f of FACETS) {
    const sel = state.selected[f.key];
    if (sel.size === 0) continue;
    const vals = f.multi ? (r[f.key] || []) : [r[f.key]];
    let ok = false;
    for (const v of vals) if (v && sel.has(v)) { ok = true; break; }
    if (!ok) return false;
  }
  if (state.q) {
    const hay = (r.name + ' ' + r.mechanism + ' ' + r.title + ' '
                 + r.author + ' ' + r.norms + ' ' + r.type).toLowerCase();
    if (!hay.includes(state.q)) return false;
  }
  return true;
}

function render() {
  const filtered = state.rows.filter(matches);
  document.querySelector('#count').textContent =
      `${filtered.length.toLocaleString()} CSO mention${filtered.length===1?'':'s'}`;
  const active = activeBits();
  document.querySelector('#active').innerHTML = active
      ? ` · ${active} <span class="clear" onclick="clearAll()">clear all</span>` : '';

  // sort: by Canonical name, then paper year desc
  filtered.sort((a,b) =>
      a.name.localeCompare(b.name) ||
      (b.year || '').localeCompare(a.year || ''));

  const out = document.querySelector('#rows');
  out.innerHTML = '';
  if (!filtered.length) {
    out.innerHTML = '<div class="empty">No matches. Try clearing some filters.</div>';
    return;
  }
  const frag = document.createDocumentFragment();
  for (const r of filtered.slice(0, 500)) {
    const div = document.createElement('div');
    div.className = 'row';
    const tags = [];
    for (const w of (r.where || [])) tags.push(tag('where', w));
    if (r.when && r.when !== 'unspecified') tags.push(tag('when', r.when));
    if (r.type)  tags.push(tag('type', r.type));
    if (r.norms) tags.push(tag('norms', r.norms));
    div.innerHTML = `
      <div><span class="name">${escapeHtml(r.name)}</span>
           ${r.type ? `<span class="type">${escapeHtml(r.type)}</span>` : ''}</div>
      ${r.mechanism ? `<div class="mech">${escapeHtml(r.mechanism)}</div>` : ''}
      <div class="src"><em>${escapeHtml(r.title)}</em>${r.author ? ' — ' + escapeHtml(r.author) : ''}${r.year ? ' (' + escapeHtml(r.year) + ')' : ''}${r.page ? ', p. ' + escapeHtml(r.page) : ''}</div>
      ${r.quote ? `<div class="quote">“${escapeHtml(r.quote)}”</div>` : ''}
      <div class="tags">${tags.join('')}</div>`;
    div.querySelectorAll('.tag').forEach(el => {
      el.onclick = () => toggle(el.dataset.key, el.dataset.val);
    });
    frag.appendChild(div);
  }
  if (filtered.length > 500) {
    const more = document.createElement('div');
    more.className = 'empty';
    more.textContent = `Showing first 500 of ${filtered.length.toLocaleString()}. Refine filters to narrow down.`;
    frag.appendChild(more);
  }
  out.appendChild(frag);
  syncHash();
}

function tag(key, val) {
  return `<span class="tag k-${key}" data-key="${key}" data-val="${escapeAttr(val)}">${escapeHtml(val)}</span>`;
}

function activeBits() {
  const parts = [];
  for (const f of FACETS) {
    if (state.selected[f.key].size)
      parts.push(`${f.label}: ${[...state.selected[f.key]].map(escapeHtml).join(', ')}`);
  }
  return parts.join(' · ');
}

function clearAll() {
  for (const k of Object.keys(state.selected)) state.selected[k].clear();
  state.q = '';
  document.querySelector('#q').value = '';
  refreshChipState();
  render();
}

function syncHash() {
  const s = {};
  for (const k of Object.keys(state.selected)) {
    if (state.selected[k].size) s[k] = [...state.selected[k]];
  }
  if (state.q) s.q = state.q;
  const h = Object.keys(s).length ? '#' + encodeURIComponent(JSON.stringify(s)) : '';
  if (location.hash !== h) history.replaceState(null, '', h || '#');
}

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escapeAttr(s) { return escapeHtml(s); }
</script>
</body>
</html>
